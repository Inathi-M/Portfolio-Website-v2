<section id="home" class="hero">
  <div class="container">
    <div class="hero-content">
      <p class="hero-intro">Hello I'm</p>
      <h1 class="hero-title">{{ personalInfo.name }}</h1>
      <p class="hero-subtitle">{{ personalInfo.role }}</p>
      <div class="hero-buttons">
        <a href="assets/cv.pdf" class="btn btn-primary" download>Download CV</a>
        <a href="#contact" class="btn btn-secondary">Let's Chat</a>
      </div>
      <div class="social-links">
        <a [href]="personalInfo.linkedin" target="_blank" aria-label="LinkedIn">
          <i class="fab fa-linkedin"></i>
        </a>
        <a [href]="personalInfo.github" target="_blank" aria-label="GitHub">
          <i class="fab fa-github"></i>
        </a>
        <a [href]="personalInfo.leetcode" target="_blank" aria-label="LeetCode">
          <i class="fas fa-code"></i>
        </a>
      </div>
      <div class="scroll-down">
        <p>Scroll Down</p>
        <span>↓</span>
      </div>
    </div>
  </div>
</section>
